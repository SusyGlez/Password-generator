<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <meta charset="UTF-8" />
  <title>Password Generator</title>
  <body>
    <div class="container">
      <h1 class="title-1">
        Generate a
        <div id="title-2">random password</div>
      </h1>
      <h2 id="description">Never use an insecure password again.</h2>
      <div id="settings">
        <p id="charactersNumber">Set password length:</p>
        <input type="number" id="characterLength" />
      </div>
      <button id="btn" onclick="generator - btn">Generate passwords</button>
      <hr />
      <div id="line">
        <div id="wraper">
          <input type="password" id="passwordOne" />
          <button id="copyPasteOne" onclick="copyPaste1()">
            <img
              src="//icons.veryicon.com/png/o/education-technology/alibaba-cloud-iot-business-department/copy-40.png"
            />
          </button>
        </div>
        <div id="eye-block">
          <input type="password" id="passwordTwo" />
          <div id="wraper2">
            <button id="copyPasteTwo" onclick="copyPaste2()">
              <img
                src="//icons.veryicon.com/png/o/education-technology/alibaba-cloud-iot-business-department/copy-40.png"
              />
            </button>
          </div>
          <button id="closed" onclick="toggleEye()">
            <img
              src="//icons.veryicon.com/png/o/miscellaneous/computer-room-integration/hide-password.png"
            />
          </button>
          <button id="open" onclick="toggleEye()">
            <img
              src="//icons.veryicon.com/png/o/miscellaneous/linear-icon-fill-icon/eye-245.png"
            />
          </button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
